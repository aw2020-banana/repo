<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d6efd">
<title>📓 靜態筆記本</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<style>
:root {
  --bg-body:#f5f6fa; --bg-side:#fff; --bg-main:#fff; --bg-bar:#f8f9fb;
  --bg-card:#f1f3f6; --tx:#1a1d23; --tx2:#6c757d; --bd:#e0e3ea;
  --acc:#0d6efd; --acc2:#dbeafe; --hov:#eef2ff; --act:#0d6efd; --sw:290px;
}
[data-theme=dark]{
  --bg-body:#12141a; --bg-side:#1a1d26; --bg-main:#1e2130; --bg-bar:#161921;
  --bg-card:#252a38; --tx:#dde1f0; --tx2:#8891aa; --bd:#2d3347;
  --acc:#4d8eff; --acc2:#1a2c50; --hov:#252a38; --act:#1f4db8;
}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;height:100dvh;overflow:hidden;background:var(--bg-body);color:var(--tx);
  font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  transition:background .3s,color .3s}
#app{display:flex;height:100dvh}

/* SIDEBAR */
#sidebar{width:var(--sw);min-width:var(--sw);background:var(--bg-side);
  border-right:1px solid var(--bd);display:flex;flex-direction:column;
  overflow:hidden;transition:transform .28s ease,box-shadow .28s;z-index:200}
@media(max-width:767px){
  #sidebar{position:fixed;top:0;left:0;height:100dvh;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0);box-shadow:6px 0 30px rgba(0,0,0,.25)}
  #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;backdrop-filter:blur(2px)}
  #overlay.show{display:block}
}
.sb-head{padding:14px 14px 10px;border-bottom:1px solid var(--bd);background:var(--bg-bar)}
.sb-brand{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sb-icon{font-size:1.4rem;color:var(--acc)}
.sb-name{font-weight:700;font-size:1rem}
.sb-search{position:relative}
.sb-search input{width:100%;padding:7px 10px 7px 32px;border-radius:10px;border:1px solid var(--bd);
  background:var(--bg-card);color:var(--tx);font-size:.82rem;outline:none;transition:border-color .2s}
.sb-search input:focus{border-color:var(--acc)}
.sb-si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tx2);font-size:.85rem;pointer-events:none}
.cat-menu{padding:6px 0;border-bottom:1px solid var(--bd)}
.cat-item{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:.83rem;
  color:var(--tx2);cursor:pointer;border-radius:7px;margin:1px 6px;transition:background .15s,color .15s}
.cat-item:hover{background:var(--hov);color:var(--tx)}
.cat-item.active{background:var(--acc2);color:var(--acc);font-weight:600}
.cat-cnt{margin-left:auto;font-size:.68rem;background:var(--bg-card);color:var(--tx2);padding:1px 7px;border-radius:10px}
#tagbar{padding:6px 10px;border-bottom:1px solid var(--bd);display:none;align-items:center;gap:6px}
#note-list{overflow-y:auto;flex:1;padding:4px 0}
.ni{padding:11px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s}
.ni:hover{background:var(--hov)}
.ni.active{background:var(--act)}
.ni .t{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni.active .t{color:#fff}
.ni .m{font-size:.72rem;color:var(--tx2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni.active .m{color:rgba(255,255,255,.7)}
.ni .tg{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}
.nitag{font-size:.62rem;padding:1px 7px;border-radius:10px;background:var(--acc2);color:var(--acc)}
.ni.active .nitag{background:rgba(255,255,255,.2);color:#fff}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;background:var(--bg-main);overflow:hidden;min-width:0}
#toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--bd);
  background:var(--bg-bar);flex-wrap:wrap;flex-shrink:0}
#toolbar .btn{border-radius:8px}
#ham{display:none}
@media(max-width:767px){#ham{display:inline-flex}}
#editor-wrap{flex:1;display:none;flex-direction:column;padding:18px 24px 10px;overflow:hidden;min-height:0}
#note-title{border:none;background:transparent;color:var(--tx);font-size:1.45rem;font-weight:700;
  width:100%;outline:none;padding:4px 0;border-bottom:2px solid var(--bd);margin-bottom:8px;transition:border-color .2s}
#note-title:focus{border-bottom-color:var(--acc)}
#tags-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:5px 0;
  border-bottom:1px dashed var(--bd);margin-bottom:8px}
.tpill{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;padding:2px 9px;
  border-radius:12px;background:var(--acc2);color:var(--acc)}
.tpill .rm{cursor:pointer;opacity:.6;font-size:.65rem}
.tpill .rm:hover{opacity:1}
#tag-input{font-size:.75rem;padding:2px 9px;border-radius:12px;border:1px dashed var(--bd);
  background:transparent;color:var(--tx);width:80px;outline:none}
#tag-input:focus{border-color:var(--acc)}
#save-st{font-size:.72rem;color:var(--tx2);margin-left:auto;flex-shrink:0}
#qwrap{flex:1;display:flex;flex-direction:column;min-height:0;border-radius:10px;
  overflow:hidden;border:1px solid var(--bd)}
.ql-toolbar.ql-snow{background:var(--bg-bar);border:none!important;
  border-bottom:1px solid var(--bd)!important;flex-shrink:0}
.ql-container.ql-snow{border:none!important;flex:1;overflow-y:auto;background:var(--bg-main)}
.ql-editor{color:var(--tx);font-size:1rem;min-height:200px}
[data-theme=dark] .ql-stroke{stroke:var(--tx2)!important}
[data-theme=dark] .ql-fill{fill:var(--tx2)!important}
[data-theme=dark] .ql-picker-label{color:var(--tx2)!important}
[data-theme=dark] .ql-picker-options{background:var(--bg-card)!important;border-color:var(--bd)!important}
[data-theme=dark] .ql-picker-item{color:var(--tx)!important}
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--tx2);text-align:center;padding:40px}
#empty i{font-size:4rem;opacity:.3}

/* A2HS */
#a2hs{display:none;position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:420px;background:var(--bg-side);border:1px solid var(--bd);
  border-radius:14px;padding:13px 16px;box-shadow:0 6px 30px rgba(0,0,0,.18);z-index:1050;
  animation:sup .4s ease}
@keyframes sup{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* AI modal content bg */
.modal-ai .modal-content{background:var(--bg-side);color:var(--tx);border-color:var(--bd)}
.modal-ai .modal-header,.modal-ai .modal-footer{border-color:var(--bd)}
.ai-cfg{background:var(--bg-card);border:1px solid var(--bd);border-radius:10px;padding:12px}
#ai-out{display:none;white-space:pre-wrap;font-size:.9rem;background:var(--bg-card);
  border:1px solid var(--bd);border-radius:10px;padding:14px;min-height:80px;
  max-height:320px;overflow-y:auto}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
</head>
<body>

<div id="overlay"></div>

<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sb-head">
      <div class="sb-brand">
        <span class="sb-icon"><i class="bi bi-journal-richtext"></i></span>
        <span class="sb-name">靜態筆記本</span>
        <button class="btn btn-sm btn-primary ms-auto rounded-circle"
          style="width:30px;height:30px;padding:0" id="btn-new" title="新增筆記 (Ctrl+N)">
          <i class="bi bi-plus-lg"></i>
        </button>
      </div>
      <div class="sb-search">
        <i class="bi bi-search sb-si"></i>
        <input type="search" id="search-input" placeholder="搜尋筆記…" autocomplete="off">
      </div>
    </div>

    <nav class="cat-menu">
      <div class="cat-item active" id="cat-all">
        <i class="bi bi-grid-3x3-gap"></i> 全部筆記
        <span class="cat-cnt" id="cnt-all">0</span>
      </div>
      <div class="cat-item" id="cat-pinned">
        <i class="bi bi-pin-angle"></i> 已釘選
        <span class="cat-cnt" id="cnt-pinned">0</span>
      </div>
      <div class="cat-item" id="cat-trash">
        <i class="bi bi-trash3"></i> 回收桶
        <span class="cat-cnt" id="cnt-trash">0</span>
      </div>
    </nav>

    <div id="tagbar">
      <small class="text-muted">標籤：</small>
      <span id="active-tag"></span>
      <button class="btn btn-sm btn-link p-0 ms-1 text-muted" id="btn-clrtag">
        <i class="bi bi-x-circle"></i>
      </button>
    </div>

    <div id="note-list"></div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="toolbar">
      <button class="btn btn-sm btn-outline-secondary" id="ham">
        <i class="bi bi-list fs-5"></i>
      </button>
      <button class="btn btn-sm btn-outline-warning" id="btn-pin" disabled title="釘選">
        <i class="bi bi-pin"></i>
      </button>
      <button class="btn btn-sm btn-outline-primary" id="btn-copy" disabled title="一鍵複製">
        <i class="bi bi-clipboard"></i> 複製
      </button>
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-success dropdown-toggle"
          id="btn-export" data-bs-toggle="dropdown" disabled>
          <i class="bi bi-download"></i> 匯出
        </button>
        <ul class="dropdown-menu shadow-sm">
          <li><a class="dropdown-item" id="mi-json" href="#">
            <i class="bi bi-filetype-json me-2 text-warning"></i>此筆記 → JSON</a></li>
          <li><a class="dropdown-item" id="mi-txt" href="#">
            <i class="bi bi-filetype-txt me-2 text-secondary"></i>此筆記 → TXT</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item" id="mi-backup" href="#">
            <i class="bi bi-archive me-2 text-primary"></i>備份全部筆記</a></li>
          <li><a class="dropdown-item" id="mi-import" href="#">
            <i class="bi bi-upload me-2 text-success"></i>匯入備份</a></li>
        </ul>
      </div>
      <input type="file" id="file-import" accept=".json" style="display:none">
      <button class="btn btn-sm btn-outline-danger" id="btn-del" disabled title="刪除">
        <i class="bi bi-trash3"></i>
      </button>
      <div class="ms-auto d-flex align-items-center gap-2">
        <button class="btn btn-sm btn-outline-info" id="btn-ai" disabled>
          <i class="bi bi-robot"></i> AI
        </button>
        <button class="btn btn-sm btn-outline-secondary" id="btn-theme">
          <i class="bi bi-moon-stars" id="theme-icon"></i>
        </button>
        <small class="text-muted d-none d-md-inline" id="storage-info"></small>
      </div>
    </div>

    <div id="editor-wrap">
      <div class="d-flex align-items-center gap-2 mb-1">
        <input type="text" id="note-title" placeholder="筆記標題…">
        <span id="save-st">
          <i class="bi bi-check-circle-fill text-success"></i>
          <span class="d-none d-sm-inline text-muted" style="font-size:.72rem"> 已儲存</span>
        </span>
      </div>
      <div id="tags-row">
        <i class="bi bi-tags text-muted" style="font-size:.8rem"></i>
        <div id="tags-con"></div>
        <input type="text" id="tag-input" placeholder="+ 標籤" maxlength="20">
      </div>
      <div id="qwrap">
        <div id="quill-editor"></div>
      </div>
    </div>

    <div id="empty">
      <i class="bi bi-journal-plus"></i>
      <h5 class="mt-3">選擇筆記或新增一篇</h5>
      <p class="text-muted small">所有資料儲存於瀏覽器 IndexedDB，不上傳伺服器。</p>
      <button class="btn btn-primary" id="btn-new2">
        <i class="bi bi-plus-lg me-1"></i>新增筆記
      </button>
    </div>
  </main>
</div>

<!-- AI Modal -->
<div class="modal fade modal-ai" id="ai-modal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-robot text-info me-2"></i>AI 助手</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="ai-cfg mb-3">
          <div class="d-flex align-items-center mb-2">
            <span class="fw-bold small"><i class="bi bi-gear me-1"></i>API 設定</span>
            <span class="ms-2 badge bg-secondary" title="設定儲存於 localStorage">localStorage ✓</span>
            <span class="ms-1 badge" style="background:#ff6b35">🐱 LongCat 免費 50M/day</span>
          </div>
          <div class="row g-2">
            <div class="col-12 col-md-4">
              <select class="form-select form-select-sm" id="ai-prov">
                <option value="longcat">LongCat AI（美團）</option>
                <option value="openai">OpenAI (GPT-4o)</option>
                <option value="openrouter">OpenRouter</option>
                <option value="ollama">Ollama（本地）</option>
              </select>
            </div>
            <div class="col-12 col-md-5">
              <input type="password" class="form-control form-control-sm"
                id="ai-key" placeholder="API Key">
            </div>
            <div class="col-12 col-md-3">
              <input type="text" class="form-control form-control-sm"
                id="ai-model" placeholder="模型名稱" value="LongCat-Flash-Lite">
            </div>
          </div>
          <div class="mt-2" id="ollama-row" style="display:none">
            <input type="text" class="form-control form-control-sm"
              id="ollama-url" value="http://localhost:11434">
            <div class="form-text" style="font-size:.7rem">需設定 OLLAMA_ORIGINS=* 開放 CORS</div>
          </div>
        </div>
        <div class="d-flex gap-2 flex-wrap mb-3">
          <button class="btn btn-sm btn-info"    id="ai-btn-sum">
            <i class="bi bi-card-text me-1"></i>摘要</button>
          <button class="btn btn-sm btn-primary"  id="ai-btn-cont">
            <i class="bi bi-arrow-right-circle me-1"></i>補全</button>
          <button class="btn btn-sm btn-success"  id="ai-btn-imp">
            <i class="bi bi-stars me-1"></i>改善文字</button>
          <button class="btn btn-sm btn-warning text-dark" id="ai-btn-tr">
            <i class="bi bi-translate me-1"></i>翻譯英文</button>
          <button class="btn btn-sm btn-secondary" id="ai-btn-cus">
            <i class="bi bi-chat-dots me-1"></i>自訂提示</button>
        </div>
        <div id="cus-wrap" style="display:none" class="mb-3">
          <div class="input-group input-group-sm">
            <textarea class="form-control" id="cus-prompt" rows="2"
              placeholder="輸入提示詞，AI 會結合筆記內容回答…"
              style="background:var(--bg-card);color:var(--tx);border-color:var(--bd)"></textarea>
            <button class="btn btn-sm btn-primary" id="ai-btn-cusgo">送出</button>
          </div>
        </div>
        <div id="ai-spin" class="text-center py-4" style="display:none">
          <div class="spinner-border text-info spinner-border-sm me-2"></div>
          <span class="text-muted">AI 處理中…</span>
        </div>
        <div id="ai-out"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-outline-secondary" id="ai-btn-cp">
          <i class="bi bi-clipboard me-1"></i>複製結果</button>
        <button class="btn btn-sm btn-primary" id="ai-btn-ins">
          <i class="bi bi-plus-lg me-1"></i>插入筆記</button>
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">關閉</button>
      </div>
    </div>
  </div>
</div>

<!-- A2HS -->
<div id="a2hs">
  <div class="d-flex align-items-center gap-3">
    <i class="bi bi-phone fs-3 text-primary"></i>
    <div class="flex-grow-1">
      <div class="fw-bold small">加入主螢幕</div>
      <div class="text-muted" style="font-size:.72rem">像原生 App 般使用</div>
    </div>
    <button class="btn btn-sm btn-primary" id="a2hs-install">安裝</button>
    <button class="btn btn-sm btn-link p-0 text-muted" id="a2hs-dismiss">
      <i class="bi bi-x-lg"></i></button>
  </div>
</div>

<!-- Toast -->
<div class="position-fixed top-0 end-0 p-3" style="z-index:1200">
  <div id="toast" class="toast text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-msg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto"
        data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- ============================================================
  載入順序：Bootstrap → Dexie → Quill → 自訂 JS
  全部放在 </body> 前確保 DOM 已就緒
============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
<script>
(function () {
  "use strict";

  /* ── 狀態 ── */
  var db, quill, aiModal;
  var S = {
    notes: [], cur: null, cat: "all",
    tagF: null, editing: false, timer: null
  };
  var deferredInstall = null;

  /* ══════════════════════════════════════
     INIT — 等 DOM + 外部腳本全部就緒
  ══════════════════════════════════════ */
  document.addEventListener("DOMContentLoaded", function () {

    /* 1. Dexie DB */
    db = new Dexie("NoteApp_v2");
    db.version(1).stores({ notes: "id, updatedAt, isPinned, isDeleted" });

    /* 2. Quill */
    quill = new Quill("#quill-editor", {
      theme: "snow",
      placeholder: "開始書寫…",
      modules: {
        toolbar: [
          [{ header: [1, 2, 3, false] }],
          ["bold", "italic", "underline", "strike"],
          [{ color: [] }, { background: [] }],
          [{ list: "ordered" }, { list: "bullet" }, { list: "check" }],
          ["blockquote", "code-block", "link"],
          ["clean"]
        ]
      }
    });
    quill.on("text-change", function () {
      if (S.editing) schedSave();
    });

    /* 3. Bootstrap AI modal */
    aiModal = new bootstrap.Modal(document.getElementById("ai-modal"));

    /* 4. 主題 */
    applyTheme(localStorage.getItem("theme") || "light");

    /* 5. 載入筆記 */
    loadNotes();

    /* 6. 持久化儲存 */
    initPersist();

    /* 7. A2HS */
    initA2HS();

    /* 8. AI 設定 */
    loadAICfg();

    /* 9. 綁定所有事件 */
    bindEvents();
  });

  /* ══════════════════════════════════════
     BIND EVENTS（全部用 addEventListener）
  ══════════════════════════════════════ */
  function bindEvents() {
    /* sidebar + hamburger */
    $("ham").addEventListener("click", openSidebar);
    $("overlay").addEventListener("click", closeSidebar);
    $("btn-new").addEventListener("click", createNote);
    $("btn-new2").addEventListener("click", createNote);

    /* 分類 */
    $("cat-all").addEventListener("click",    function () { setCat("all"); });
    $("cat-pinned").addEventListener("click", function () { setCat("pinned"); });
    $("cat-trash").addEventListener("click",  function () { setCat("trash"); });

    /* 搜尋 */
    $("search-input").addEventListener("input", renderList);

    /* 標籤清除 */
    $("btn-clrtag").addEventListener("click", function () {
      S.tagF = null;
      $("tagbar").style.display = "none";
      renderList();
    });

    /* toolbar 按鈕 */
    $("btn-pin").addEventListener("click",    doPin);
    $("btn-copy").addEventListener("click",   doCopy);
    $("btn-del").addEventListener("click",    doDel);
    $("btn-ai").addEventListener("click",     openAI);
    $("btn-theme").addEventListener("click",  toggleTheme);

    /* 匯出 */
    $("mi-json").addEventListener("click",   function (e) { e.preventDefault(); exportNote("json"); });
    $("mi-txt").addEventListener("click",    function (e) { e.preventDefault(); exportNote("txt"); });
    $("mi-backup").addEventListener("click", function (e) { e.preventDefault(); backupAll(); });
    $("mi-import").addEventListener("click", function (e) { e.preventDefault(); $("file-import").click(); });
    $("file-import").addEventListener("change", importBackup);

    /* 編輯器欄位 */
    $("note-title").addEventListener("input", schedSave);
    $("tag-input").addEventListener("keydown", onTagKey);

    /* AI modal 內部按鈕 */
    $("ai-prov").addEventListener("change",   onProvChange);
    $("ai-key").addEventListener("input",     saveAICfg);
    $("ai-model").addEventListener("input",   saveAICfg);
    $("ollama-url").addEventListener("input", saveAICfg);
    $("ai-btn-sum").addEventListener("click", function () { aiRun("summarize"); });
    $("ai-btn-cont").addEventListener("click",function () { aiRun("continue"); });
    $("ai-btn-imp").addEventListener("click", function () { aiRun("improve"); });
    $("ai-btn-tr").addEventListener("click",  function () { aiRun("translate"); });
    $("ai-btn-cus").addEventListener("click", function () {
      $("cus-wrap").style.display = "block";
      $("cus-prompt").focus();
    });
    $("ai-btn-cusgo").addEventListener("click", function () { aiRun("custom"); });
    $("ai-btn-cp").addEventListener("click",  copyAI);
    $("ai-btn-ins").addEventListener("click", insertAI);

    /* A2HS */
    $("a2hs-install").addEventListener("click",  doInstall);
    $("a2hs-dismiss").addEventListener("click",  dismissA2HS);

    /* Ctrl+N */
    document.addEventListener("keydown", function (e) {
      if ((e.ctrlKey || e.metaKey) && e.key === "n") {
        e.preventDefault();
        createNote();
      }
    });
  }

  /* ══════════════════════════════════════
     DATABASE
  ══════════════════════════════════════ */
  function loadNotes() {
    db.notes.orderBy("updatedAt").reverse().toArray().then(function (rows) {
      S.notes = rows;
      renderList();
      updateCounts();
      updateTagBar();
    });
  }

  /* ══════════════════════════════════════
     RENDER NOTE LIST
  ══════════════════════════════════════ */
  function renderList() {
    var q = ($("search-input").value || "").toLowerCase();
    var list = S.notes.slice();

    if (S.cat === "pinned")     list = list.filter(function (n) { return n.isPinned && !n.isDeleted; });
    else if (S.cat === "trash") list = list.filter(function (n) { return n.isDeleted; });
    else                        list = list.filter(function (n) { return !n.isDeleted; });

    if (S.tagF) list = list.filter(function (n) { return (n.tags || []).indexOf(S.tagF) >= 0; });

    if (q) list = list.filter(function (n) {
      return (n.title || "").toLowerCase().indexOf(q) >= 0 ||
             (n.plain  || "").toLowerCase().indexOf(q) >= 0 ||
             (n.tags   || []).some(function (t) { return t.toLowerCase().indexOf(q) >= 0; });
    });

    var el = $("note-list");
    if (!list.length) {
      el.innerHTML = '<div class="text-center py-5 text-muted small">' +
        '<i class="bi bi-journal-x d-block mb-2" style="font-size:2rem;opacity:.3"></i>沒有筆記</div>';
      return;
    }
    el.innerHTML = list.map(function (n) {
      var active = n.id === S.cur ? "active" : "";
      var date = new Date(n.updatedAt).toLocaleDateString("zh-TW", { month: "short", day: "numeric" });
      var prev = (n.plain || "尚無內容").slice(0, 55);
      var pin  = n.isPinned
        ? '<i class="bi bi-pin-fill me-1" style="color:#ffc107;font-size:.7rem"></i>' : "";
      var tags = (n.tags || []).map(function (t) {
        return '<span class="nitag">' + esc(t) + "</span>";
      }).join("");
      return '<div class="ni ' + active + '" data-id="' + n.id + '">' +
        '<div class="t">' + pin + (esc(n.title) || "（無標題）") + "</div>" +
        '<div class="m">' + esc(date) + " · " + esc(prev) + "</div>" +
        (tags ? '<div class="tg">' + tags + "</div>" : "") +
        "</div>";
    }).join("");

    /* 點擊事件用事件委派 */
    el.querySelectorAll(".ni").forEach(function (el) {
      el.addEventListener("click", function () { openNote(this.dataset.id); });
    });
  }

  function updateCounts() {
    var active = S.notes.filter(function (n) { return !n.isDeleted; });
    $("cnt-all").textContent    = active.length;
    $("cnt-pinned").textContent = active.filter(function (n) { return n.isPinned; }).length;
    $("cnt-trash").textContent  = S.notes.filter(function (n) { return n.isDeleted; }).length;
  }

  function updateTagBar() {
    var tb = $("tagbar");
    if (!S.tagF) { tb.style.display = "none"; return; }
    tb.style.display = "flex";
    $("active-tag").innerHTML = '<span class="tpill">' + esc(S.tagF) + "</span>";
  }

  /* ══════════════════════════════════════
     CREATE NOTE
  ══════════════════════════════════════ */
  function createNote() {
    var note = {
      id: crypto.randomUUID(),
      title: "", content: "", plain: "", tags: [],
      isPinned: false, isDeleted: false,
      createdAt: Date.now(), updatedAt: Date.now()
    };
    db.notes.add(note).then(function () {
      S.notes.unshift(note);
      renderList();
      updateCounts();
      openNote(note.id);
      closeSidebar();
    });
  }

  /* ══════════════════════════════════════
     OPEN NOTE
  ══════════════════════════════════════ */
  function openNote(id) {
    S.editing = false;
    S.cur = id;
    var n = S.notes.find(function (x) { return x.id === id; });
    if (!n) return;
    $("note-title").value = n.title || "";
    quill.root.innerHTML  = n.content || "";
    renderTags(n.tags || []);
    $("editor-wrap").style.display = "flex";
    $("editor-wrap").style.flexDirection = "column";
    $("empty").style.display = "none";
    setToolbar(true, n.isPinned);
    setSaveSt("saved");
    renderList();
    setTimeout(function () { S.editing = true; }, 120);
  }

  /* ══════════════════════════════════════
     SAVE
  ══════════════════════════════════════ */
  function schedSave() {
    setSaveSt("saving");
    clearTimeout(S.timer);
    S.timer = setTimeout(saveNote, 900);
  }

  function saveNote() {
    if (!S.cur) return;
    var n = S.notes.find(function (x) { return x.id === S.cur; });
    if (!n) return;
    n.title     = $("note-title").value;
    n.content   = quill.root.innerHTML;
    n.plain     = quill.getText().trim();
    n.updatedAt = Date.now();
    db.notes.put(n).then(function () {
      renderList();
      setSaveSt("saved");
      refreshStorage();
    });
  }

  function setSaveSt(s) {
    $("save-st").innerHTML = s === "saved"
      ? '<i class="bi bi-check-circle-fill text-success"></i>' +
        '<span class="d-none d-sm-inline text-muted" style="font-size:.72rem"> 已儲存</span>'
      : '<i class="bi bi-circle text-warning"></i>' +
        '<span class="d-none d-sm-inline text-muted" style="font-size:.72rem"> 儲存中…</span>';
  }

  /* ══════════════════════════════════════
     TAGS
  ══════════════════════════════════════ */
  function renderTags(tags) {
    $("tags-con").innerHTML = tags.map(function (t) {
      return '<span class="tpill">' + esc(t) +
        '<span class="rm" data-tag="' + esc(t) + '">✕</span></span>';
    }).join("");
    $("tags-con").querySelectorAll(".rm").forEach(function (el) {
      el.addEventListener("click", function () { removeTag(this.dataset.tag); });
    });
  }

  function onTagKey(e) {
    if (e.key !== "Enter" && e.key !== ",") return;
    e.preventDefault();
    var val = e.target.value.replace(",", "").trim();
    if (!val) return;
    e.target.value = "";
    var n = S.notes.find(function (x) { return x.id === S.cur; });
    if (!n || n.tags.indexOf(val) >= 0) return;
    n.tags.push(val);
    db.notes.put(n).then(function () {
      renderTags(n.tags);
      renderList();
    });
  }

  function removeTag(tag) {
    var n = S.notes.find(function (x) { return x.id === S.cur; });
    if (!n) return;
    n.tags = n.tags.filter(function (t) { return t !== tag; });
    db.notes.put(n).then(function () {
      renderTags(n.tags);
      renderList();
    });
  }

  /* ══════════════════════════════════════
     PIN / DELETE
  ══════════════════════════════════════ */
  function doPin() {
    var n = S.notes.find(function (x) { return x.id === S.cur; });
    if (!n) return;
    n.isPinned = !n.isPinned;
    db.notes.put(n).then(function () {
      setToolbar(true, n.isPinned);
      updateCounts();
      renderList();
      toast(n.isPinned ? "📌 已釘選" : "📌 取消釘選");
    });
  }

  function doDel() {
    var n = S.notes.find(function (x) { return x.id === S.cur; });
    if (!n) return;
    if (n.isDeleted) {
      if (!confirm("永久刪除此筆記？")) return;
      db.notes.delete(n.id).then(function () {
        S.notes = S.notes.filter(function (x) { return x.id !== n.id; });
        closeEditor();
        renderList();
        updateCounts();
        toast("🗑️ 已永久刪除");
      });
    } else {
      n.isDeleted = true;
      db.notes.put(n).then(function () {
        closeEditor();
        renderList();
        updateCounts();
        toast("🗑️ 已移至回收桶");
      });
    }
  }

  function closeEditor() {
    S.cur = null; S.editing = false;
    $("editor-wrap").style.display = "none";
    $("empty").style.display = "flex";
    setToolbar(false, false);
  }

  function setToolbar(on, pinned) {
    ["btn-pin", "btn-copy", "btn-export", "btn-del", "btn-ai"]
      .forEach(function (id) { $(id).disabled = !on; });
    var b = $("btn-pin");
    b.innerHTML = '<i class="bi bi-pin' + (pinned ? "-fill" : "") + '"></i>';
    b.className = "btn btn-sm btn-" + (pinned ? "warning" : "outline-warning");
  }

  /* ══════════════════════════════════════
     CATEGORY
  ══════════════════════════════════════ */
  function setCat(cat) {
    S.cat = cat; S.tagF = null;
    document.querySelectorAll(".cat-item").forEach(function (el) {
      el.classList.remove("active");
    });
    $("cat-" + cat).classList.add("active");
    $("tagbar").style.display = "none";
    renderList();
  }

  /* ══════════════════════════════════════
     COPY
  ══════════════════════════════════════ */
  function doCopy() {
    var n = S.notes.find(function (x) { return x.id === S.cur; });
    if (!n) return;
    var text = (n.title ? n.title + "\n\n" : "") + quill.getText();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        toast("📋 已複製到剪貼簿", "success");
      }).catch(function () { fallbackCopy(text); });
    } else {
      fallbackCopy(text);
    }
  }
  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;opacity:0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    toast("📋 已複製（降級模式）", "success");
  }

  /* ══════════════════════════════════════
     EXPORT / IMPORT
  ══════════════════════════════════════ */
  function exportNote(fmt) {
    var n = S.notes.find(function (x) { return x.id === S.cur; });
    if (!n) return;
    var content, name, mime;
    if (fmt === "json") {
      content = JSON.stringify(n, null, 2);
      name = (n.title || "note") + ".json";
      mime = "application/json";
    } else {
      content = (n.title || "") + "\n" + "=".repeat(40) + "\n\n" +
                quill.getText() + "\n\n標籤: " + (n.tags || []).join(", ");
      name = (n.title || "note") + ".txt";
      mime = "text/plain;charset=utf-8";
    }
    dl(content, name, mime);
    toast("📥 匯出成功");
  }

  function backupAll() {
    db.notes.toArray().then(function (all) {
      dl(JSON.stringify({ version: 2, exportedAt: new Date().toISOString(), notes: all }, null, 2),
        "noteapp-backup-" + Date.now() + ".json", "application/json");
      toast("📦 已備份 " + all.length + " 篇");
    });
  }

  function importBackup(ev) {
    var file = ev.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      try {
        var data = JSON.parse(e.target.result);
        var arr  = data.notes || (Array.isArray(data) ? data : [data]);
        var count = 0;
        var chain = Promise.resolve();
        arr.forEach(function (n) {
          chain = chain.then(function () {
            return db.notes.get(n.id).then(function (ex) {
              if (!ex) { count++; return db.notes.add(n); }
            });
          });
        });
        chain.then(function () {
          loadNotes();
          toast("✅ 匯入 " + count + " 篇", "success");
        });
      } catch (err) {
        toast("❌ 格式錯誤，匯入失敗", "danger");
      }
    };
    reader.readAsText(file);
    ev.target.value = "";
  }

  function dl(content, name, mime) {
    var url = URL.createObjectURL(new Blob([content], { type: mime }));
    var a = document.createElement("a");
    a.href = url; a.download = name; a.click();
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  /* ══════════════════════════════════════
     THEME
  ══════════════════════════════════════ */
  function toggleTheme() {
    var t = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
    applyTheme(t);
  }
  function applyTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    localStorage.setItem("theme", t);
    $("theme-icon").className = t === "dark" ? "bi bi-sun" : "bi bi-moon-stars";
    var ed  = document.querySelector(".ql-editor");
    var con = document.querySelector(".ql-container");
    if (ed)  { ed.style.color  = t === "dark" ? "#dde1f0" : "#1a1d23";
               ed.style.background = t === "dark" ? "#1e2130" : "#fff"; }
    if (con) { con.style.background = t === "dark" ? "#1e2130" : "#fff"; }
  }

  /* ══════════════════════════════════════
     SIDEBAR (MOBILE)
  ══════════════════════════════════════ */
  function openSidebar()  {
    $("sidebar").classList.add("open");
    $("overlay").classList.add("show");
  }
  function closeSidebar() {
    $("sidebar").classList.remove("open");
    $("overlay").classList.remove("show");
  }

  /* ══════════════════════════════════════
     PERSISTENT STORAGE
     navigator.storage.persist() 讓 IndexedDB
     不會因瀏覽器空間不足而被自動清除
  ══════════════════════════════════════ */
  function initPersist() {
    if (!navigator.storage || !navigator.storage.persist) return;
    navigator.storage.persisted().then(function (ok) {
      if (!ok) {
        navigator.storage.persist().then(function (granted) {
          if (granted) toast("💾 持久化儲存已啟用", "success");
        });
      }
    });
    refreshStorage();
  }
  function refreshStorage() {
    if (!navigator.storage || !navigator.storage.estimate) return;
    navigator.storage.estimate().then(function (e) {
      var used  = ((e.usage  || 0) / 1048576).toFixed(2);
      var quota = ((e.quota  || 0) / 1048576).toFixed(0);
      $("storage-info").textContent = "\uD83D\uDCBE " + used + "/" + quota + " MB";
    });
  }

  /* ══════════════════════════════════════
     A2HS
  ══════════════════════════════════════ */
  function initA2HS() {
    window.addEventListener("beforeinstallprompt", function (e) {
      e.preventDefault();
      deferredInstall = e;
      if (!localStorage.getItem("a2hs_dismissed")) {
        setTimeout(function () { $("a2hs").style.display = "block"; }, 3000);
      }
    });
    window.addEventListener("appinstalled", function () {
      $("a2hs").style.display = "none";
      toast("🎉 安裝成功！", "success");
    });
  }
  function doInstall() {
    if (!deferredInstall) {
      toast("📱 iOS：點 Safari 分享 → 加入主畫面", "info");
      return;
    }
    deferredInstall.prompt();
    deferredInstall.userChoice.then(function (r) {
      deferredInstall = null;
      $("a2hs").style.display = "none";
      if (r.outcome === "accepted") toast("🎉 安裝成功！", "success");
    });
  }
  function dismissA2HS() {
    $("a2hs").style.display = "none";
    localStorage.setItem("a2hs_dismissed", "1");
  }

  /* ══════════════════════════════════════
     AI ASSISTANT
     LongCat API 與 OpenAI 完全相容：
     POST https://api.longcat.chat/openai/v1/chat/completions
     Authorization: Bearer <API_KEY>
  ══════════════════════════════════════ */
  var AI_EP = {
    longcat:    "https://api.longcat.chat/openai/v1/chat/completions",
    openai:     "https://api.openai.com/v1/chat/completions",
    openrouter: "https://openrouter.ai/api/v1/chat/completions"
  };
  var AI_MDL = {
    longcat: "LongCat-Flash-Lite", openai: "gpt-4o-mini",
    openrouter: "openai/gpt-4o-mini", ollama: "llama3"
  };

  function loadAICfg() {
    var p = localStorage.getItem("ai_prov") || "longcat";
    $("ai-prov").value   = p;
    $("ai-key").value    = localStorage.getItem("ai_key")       || "";
    $("ai-model").value  = localStorage.getItem("ai_model")     || AI_MDL[p];
    $("ollama-url").value= localStorage.getItem("ollama_url")   || "http://localhost:11434";
    updateOllamaRow(p);
  }
  function saveAICfg() {
    var p = $("ai-prov").value;
    localStorage.setItem("ai_prov",     p);
    localStorage.setItem("ai_key",      $("ai-key").value);
    localStorage.setItem("ai_model",    $("ai-model").value);
    localStorage.setItem("ollama_url",  $("ollama-url").value);
  }
  function onProvChange() {
    var p = $("ai-prov").value;
    $("ai-model").value = AI_MDL[p] || "gpt-4o-mini";
    updateOllamaRow(p);
    saveAICfg();
  }
  function updateOllamaRow(p) {
    $("ollama-row").style.display = p === "ollama" ? "block" : "none";
    var hints = {
      longcat: "LongCat API Key（從 longcat.chat 申請）",
      openai:  "sk-…", openrouter: "sk-or-…",
      ollama:  "（本地無需 API Key）"
    };
    $("ai-key").placeholder = hints[p] || "API Key";
  }

  function openAI() {
    $("ai-out").style.display = "none";
    $("cus-wrap").style.display = "none";
    aiModal.show();
  }

  function aiRun(action) {
    saveAICfg();
    var n = S.notes.find(function (x) { return x.id === S.cur; });
    if (!n) return;
    var noteText = (n.title ? "標題：" + n.title + "\n\n" : "") + quill.getText();
    var prompts = {
      summarize:  "請用繁體中文為以下筆記生成簡潔摘要（100–150字）：\n\n" + noteText,
      continue:   "請用繁體中文繼續以下筆記，自然補全內容（約200字）：\n\n" + noteText,
      improve:    "請用繁體中文改善以下筆記的表達，使其更清晰流暢：\n\n" + noteText,
      translate:  "Please translate the following note to English:\n\n" + noteText,
      custom:     $("cus-prompt").value + "\n\n---\n" + noteText
    };
    callAI(prompts[action]);
  }

  function callAI(prompt) {
    var prov  = $("ai-prov").value;
    var key   = $("ai-key").value;
    var model = $("ai-model").value;
    var oUrl  = $("ollama-url").value;

    $("ai-spin").style.display = "block";
    $("ai-out").style.display  = "none";

    var p;
    if (prov === "ollama") {
      p = fetch(oUrl + "/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: model,
          messages: [{ role: "user", content: prompt }], stream: false })
      }).then(function (r) { return r.json(); })
        .then(function (d) { return d.message && d.message.content || "（無回應）"; });
    } else {
      var url = AI_EP[prov] || AI_EP.openai;
      p = fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json",
                   "Authorization": "Bearer " + key },
        body: JSON.stringify({ model: model,
          messages: [{ role: "user", content: prompt }], max_tokens: 1200 })
      }).then(function (r) {
        return r.json().then(function (d) {
          if (!r.ok) throw new Error(d.error && d.error.message || "HTTP " + r.status);
          return d.choices && d.choices[0] && d.choices[0].message &&
                 d.choices[0].message.content || "（無回應）";
        });
      });
    }

    p.then(function (result) {
      $("ai-spin").style.display = "none";
      var el = $("ai-out");
      el.style.display = "block";
      el.textContent   = result;
    }).catch(function (err) {
      $("ai-spin").style.display = "none";
      var el = $("ai-out");
      el.style.display = "block";
      el.textContent = "❌ 錯誤：" + err.message +
        "\n\n請確認 API Key 或網路設定。";
    });
  }

  function copyAI() {
    var text = $("ai-out").textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(function () {
      toast("📋 AI 結果已複製", "success");
    }).catch(function () { fallbackCopy(text); });
  }

  function insertAI() {
    var text = $("ai-out").textContent;
    if (!text || !S.cur) return;
    var len = quill.getLength();
    quill.insertText(len - 1, "\n\n" + text);
    aiModal.hide();
    saveNote();
    toast("✅ 已插入筆記", "success");
  }

  /* ══════════════════════════════════════
     TOAST
  ══════════════════════════════════════ */
  function toast(msg, type) {
    type = type || "dark";
    var el = $("toast");
    el.className = "toast text-white border-0 bg-" + type;
    $("toast-msg").textContent = msg;
    bootstrap.Toast.getOrCreateInstance(el, { delay: 2800 }).show();
  }

  /* ══════════════════════════════════════
     UTIL
  ══════════════════════════════════════ */
  function $(id) { return document.getElementById(id); }
  function esc(s) {
    if (!s) return "";
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

})();
</script>
</body>
