    <style>
        /* ==================== 全局样式 ==================== */
        :root {
            /* 配色方案 */
            --primary-color: #4a90e2;
            --secondary-color: #667eea;
            --accent-color: #f56565;
            --success-color: #48bb78;
            --warning-color: #ed8936;
            
            /* 背景和文字颜色 */
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-card: #ffffff;
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --text-muted: #a0aec0;
            --border-color: #e2e8f0;
            
            /* 阴影和圆角 */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-md: 10px;
            --radius-lg: 16px;
            
            /* 间距 */
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Noto Sans', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==================== 容器布局 ==================== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }

        /* ==================== 导航栏 ==================== */
        .navbar {
            background: var(--bg-primary);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: var(--spacing-sm) 0;
        }

        .navbar-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-md);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            flex-shrink: 0;
        }

        .nav-tabs {
            display: flex;
            gap: var(--spacing-xs);
            flex: 1;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .nav-tabs::-webkit-scrollbar {
            display: none;
        }

        .nav-tab {
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: var(--radius-md);
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-tab:hover {
            background: var(--bg-secondary);
            color: var(--primary-color);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .nav-tab-add {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 2px dashed var(--border-color);
            color: var(--text-muted);
        }

        .nav-actions {
            display: flex;
            gap: var(--spacing-sm);
            flex-shrink: 0;
        }

        .btn {
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: var(--radius-md);
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            box-shadow: 0 2px 8px rgba(74, 144, 226, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-danger {
            background: var(--accent-color);
            color: white;
        }

        /* ==================== 主体内容 ==================== */
        .main-content {
            padding: var(--spacing-lg) 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-lg);
        }

        @media (min-width: 768px) {
            .main-content {
                grid-template-columns: 280px 1fr;
            }
        }

        /* ==================== 侧边栏 ==================== */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .sidebar-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            box-shadow: var(--shadow-sm);
        }

        .sidebar-card h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .storage-info {
            text-align: center;
        }

        .storage-progress {
            width: 100%;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            margin: var(--spacing-sm) 0;
        }

        .storage-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            transition: width 0.3s ease;
        }

        .storage-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .storage-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
        }

        .storage-stat {
            padding: var(--spacing-sm);
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            text-align: center;
        }

        .storage-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .storage-stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ==================== 帖子列表 ==================== */
        .posts-container {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .post-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .post-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-sm);
        }

        .post-category {
            padding: 4px 12px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .post-date {
            font-size: 13px;
            color: var(--text-muted);
        }

        .post-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
            line-height: 1.4;
        }

        .post-content {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: var(--spacing-md);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-md);
        }

        .post-actions {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }

        /* ==================== 编辑器 ==================== */
        .editor-container {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .form-textarea {
            min-height: 200px;
            resize: vertical;
        }

        .image-upload {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .image-upload:hover {
            border-color: var(--primary-color);
            background: var(--bg-secondary);
        }

        .image-upload-icon {
            font-size: 48px;
            color: var(--text-muted);
            margin-bottom: var(--spacing-sm);
        }

        .image-preview {
            max-width: 100%;
            max-height: 300px;
            margin-top: var(--spacing-md);
            border-radius: var(--radius-md);
            object-fit: cover;
        }

        /* ==================== 模态框 ==================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;

    <!-- 页脚 -->

        <div class="container">
            <p>作者: AutoGLM (网页内容由AI生成) Copyright © 2025 AutoGLM. 保留所有权利.</p>
        </div>
    </footer>

    <script>
        /**
         * ==================== 论坛系统核心功能实现 ====================
         * 包含：IndexedDB存储、图片压缩、分类管理、数据导入导出、PWA功能等
         */

        // ==================== 数据库配置 ====================
        const DB_CONFIG = {
            name: 'forum_db',
            version: 1,
            stores: {
                posts: { keyPath: 'id', autoIncrement: true },
                categories: { keyPath: 'id', autoIncrement: true }
            }
        };

        // ==================== 默认分类 ====================
        const DEFAULT_CATEGORIES = [
            { name: '全部', icon: '📌' },
            { name: '技术', icon: '💻' },
            { name: '生活', icon: '🌸' },
            { name: '分享', icon: '🎁' }
        ];

        // ==================== 全局状态 ====================
        let db = null;
        let currentCategory = '全部';
        let uploadedImageBlob = null;
        let deferredPrompt = null;

        // ==================== IndexedDB 初始化 ====================
        /**
         * 打开IndexedDB数据库
         * 使用Promise封装异步操作，提高代码可读性
         */
        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_CONFIG.name, DB_CONFIG.version);

                // 数据库版本升级时创建对象存储和索引
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    
                    // 创建帖子存储，使用时间戳创建索引便于排序
                    if (!database.objectStoreNames.contains('posts')) {
                        const postsStore = database.createObjectStore('posts', { 
                            keyPath: 'id', 
                            autoIncrement: true 
                        });
                        postsStore.createIndex('timestamp', 'timestamp', { unique: false });
                        postsStore.createIndex('category', 'category', { unique: false });
                    }

                    // 创建分类存储
                    if (!database.objectStoreNames.contains('categories')) {
                        const categoriesStore = database.createObjectStore('categories', { 
                            keyPath: 'id', 
                            autoIncrement: true 
                        });
                        categoriesStore.createIndex('name', 'name', { unique: false });
                    }

                    // 初始化默认分类
                    if (event.oldVersion < 1) {
                        const transaction = event.target.transaction;
                        const categoriesStore = transaction.objectStore('categories');
                        DEFAULT_CATEGORIES.forEach(category => {
                            categoriesStore.add(category);
                        });
                    }
                };

                request.onsuccess = () => {
                    db = request.result;
                    console.log('✅ 数据库连接成功');
                    resolve(db);
                };

                request.onerror = () => {
                    console.error('❌ 数据库连接失败:', request.error);
                    reject(request.error);
                };
            });
        }

        // ==================== 通用数据库操作方法 ====================
        /**
         * 执行数据库事务的通用方法
         * @param {string} storeName - 对象存储名称
         * @param {string} mode - 事务模式 ('readonly' 或 'readwrite')
         * @param {function} callback - 操作回调函数
         */
        async function dbTransaction(storeName, mode, callback) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(storeName, mode);
                const store = transaction.objectStore(storeName);
                const request = callback(store);

                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        /**
         * 添加或更新数据（put操作）
         * @param {string} storeName - 对象存储名称
         * @param {object} data - 要保存的数据对象
         */
        async function dbPut(storeName, data) {
            return dbTransaction(storeName, 'readwrite', store => store.put(data));
        }

        /**
         * 删除数据
         * @param {string} storeName - 对象存储名称
         * @param {*} key - 主键值
         */
        async function dbDelete(storeName, key) {
            return dbTransaction(storeName, 'readwrite', store => store.delete(key));
        }

        /**
         * 获取单条数据
         * @param {string} storeName - 对象存储名称
         * @param {*} key - 主键值
         */
        async function dbGet(storeName, key) {
            return dbTransaction(storeName, 'readonly', store => store.get(key));
        }

        /**
         * 获取所有数据
         * @param {string} storeName - 对象存储名称
         */
        async function dbGetAll(storeName) {
            return dbTransaction(storeName, 'readonly', store => store.getAll());
        }

        /**
         * 使用游标获取数据（适合大数据量场景）
         * @param {string} storeName - 对象存储名称
         * @param {function} callback - 游标回调函数
         */
        async function dbCursor(storeName, callback) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(storeName, 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.openCursor();

                request.onsuccess = () => callback(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // ==================== 分类管理 ====================
        /**
         * 加载所有分类
         * @returns {Promise<Array>} 分类数组
         */
        async function loadCategories() {
            try {
                const categories = await dbGetAll('categories');
                return categories.sort((a, b) => a.id - b.id);
            } catch (error) {
                console.error('加载分类失败:', error);
                return [];
            }
        }

        /**
         * 渲染分类标签
         */
        async function renderCategories() {
            const categories = await loadCategories();
            const tabsContainer = document.getElementById('categoryTabs');
            const categorySelect = document.getElementById('postCategory');
            
            // 渲染标签栏
            tabsContainer.innerHTML = categories.map(category => `
                <button class="nav-tab ${category.name === currentCategory ? 'active' : ''}" 
                        onclick="filterByCategory('${category.name}')">
                    ${category.icon || ''} ${category.name}
                </button>
            `).join('') + `
                <button class="nav-tab nav-tab-add" onclick="showAddCategory()">+</button>
            `;

            // 渲染编辑器中的分类选择框
            categorySelect.innerHTML = categories
                .filter(c => c.name !== '全部')
                .map(category => `<option value="${category.name}">${category.icon || ''} ${category.name}</option>`)
                .join('');
        }

        /**
         * 按分类筛选帖子
         * @param {string} categoryName - 分类名称
         */
        async function filterByCategory(categoryName) {
            currentCategory = categoryName;
            await renderCategories();
            await loadPosts();
        }

        /**
         * 显示添加分类模态框
         */
        function showAddCategory() {
            document.getElementById('categoryModalTitle').textContent = '添加分类';
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryModal').classList.add('active');
        }

        /**
         * 显示编辑分类模态框
         * @param {number} id - 分类ID
         */
        async function showEditCategory(id) {
            try {
                const category = await dbGet('categories', id);
                document.getElementById('categoryModalTitle').textContent = '编辑分类';
                document.getElementById('categoryId').value = id;
                document.getElementById('categoryName').value = category.name;
                document.getElementById('categoryModal').classList.add('active');
            } catch (error) {
                console.error('加载分类失败:', error);
                showToast('加载分类失败', 'error');
            }
        }

        /**
         * 保存分类
         */
        async function saveCategory() {
            const id = document.getElementById('categoryId').value;
            const name = document.getElementById('categoryName').value.trim();

            if (!name) {
                showToast('请输入分类名称', 'warning');
                return;
            }

            try {
                if (id) {
                    // 更新现有分类
                    const category = await dbGet('categories', parseInt(id));
                    category.name = name;
                    await dbPut('categories', category);
                    showToast('分类更新成功', 'success');
                } else {
                    // 添加新分类
                    await dbPut('categories', { name, icon: '📁' });
                    showToast('分类添加成功', 'success');
                }
                
                await renderCategories();
                closeCategoryModal();
            } catch (error) {
                console.error('保存分类失败:', error);
                showToast('保存分类失败', 'error');
            }
        }

        /**
         * 删除分类
         * @param {number} id - 分类ID
         */
        async function deleteCategory(id) {
            try {
                // 检查该分类下是否有帖子
                const category = await dbGet('categories', id);
                if (category.name === '全部') {
                    showToast('无法删除默认分类', 'warning');
                    return;
                }

                await dbDelete('categories', id);
                showToast('分类删除成功', 'success');
                await renderCategories();
            } catch (error) {
                console.error('删除分类失败:', error);
                showToast('删除分类失败', 'error');
            }
        }

        /**
         * 关闭分类模态框
         */
        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.remove('active');
        }

        /**
         * 渲染设置页面中的分类列表
         */
        async function renderSettingsCategories() {
            const categories = await loadCategories();
            const container = document.getElementById('categoriesList');
            
            container.innerHTML = categories.map(category => `
                <div class="settings-item" style="padding: var(--spacing-sm);">
                    <div class="settings-item-label">${category.icon || ''} ${category.name}</div>
                    <div>
                        ${category.name !== '全部' ? `
                            <button class="btn btn-secondary" style="padding: 4px 8px;" onclick="showEditCategory(${category.id})">编辑</button>
                            <button class="btn btn-danger" style="padding: 4px 8px;" onclick="deleteCategory(${category.id})">删除</button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // ==================== 帖子管理 ====================
        /**
         * 加载帖子列表
         */
        async function loadPosts() {
            try {
                let posts = await dbGetAll('posts');
                
                // 按分类筛选
                if (currentCategory !== '全部') {
                    posts = posts.filter(post => post.category === currentCategory);
                }

                // 按时间倒序排列
                posts.sort((a, b) => b.timestamp - a.timestamp);

                renderPosts(posts);
                await updateStorageInfo();
            } catch (error) {
                console.error('加载帖子失败:', error);
                showToast('加载帖子失败', 'error');
            }
        }

        /**
         * 渲染帖子列表
         * @param {Array} posts - 帖子数组
         */
        function renderPosts(posts) {
            const container = document.getElementById('postsContainer');

            if (posts.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: var(--spacing-xl); color: var(--text-muted);">
                        <div style="font-size: 48px; margin-bottom: var(--spacing-md);">📭</div>
                        <div>暂无帖子，点击"新建帖子"开始创作吧！</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = posts.map(post => {
                const imageUrl = post.image ? URL.createObjectURL(post.image) : '';
                const date = new Date(post.timestamp).toLocaleDateString('zh-CN');
                
                return `
                    <div class="post-card" onclick="viewPost(${post.id})">
                        <div class="post-header">
                            <span class="post-category">${post.category}</span>
                            <span class="post-date">${date}</span>
                        </div>
                        ${imageUrl ? `<img src="${imageUrl}" class="post-image" alt="帖子图片">` : ''}
                        <div class="post-title">${post.title}</div>
                        <div class="post-content">${post.content}</div>
                        <div class="post-actions">
                            <button class="btn btn-secondary" onclick="event.stopPropagation(); editPost(${post.id})">✏️ 编辑</button>
                            <button class="btn btn-danger" onclick="event.stopPropagation(); deletePost(${post.id})">🗑️ 删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        /**
         * 显示帖子编辑器
         */
        async function showEditor() {
            document.getElementById('editorTitle').textContent = '新建帖子';
            document.getElementById('postId').value = '';
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            document.getElementById('imagePreview').classList.add('hidden');
            uploadedImageBlob = null;
            
            await renderCategories();
            document.getElementById('editorModal').classList.add('active');
        }

        /**
         * 编辑帖子
         * @param {number} id - 帖子ID
         */
        async function editPost(id) {
            try {
                const post = await dbGet('posts', id);
                
                document.getElementById('editorTitle').textContent = '编辑帖子';
                document.getElementById('postId').value = id;
                document.getElementById('postTitle').value = post.title;
                document.getElementById('postContent').value = post.content;
                document.getElementById('postCategory').value = post.category;
                
                if (post.image) {
                    const imageUrl = URL.createObjectURL(post.image);
                    const imagePreview = document.getElementById('imagePreview');
                    imagePreview.src = imageUrl;
                    imagePreview.classList.remove('hidden');
                    uploadedImageBlob = post.image;
                } else {
                    document.getElementById('imagePreview').classList.add('hidden');
                    uploadedImageBlob = null;
                }

                await renderCategories();
                document.getElementById('editorModal').classList.add('active');
            } catch (error) {
                console.error('加载帖子失败:', error);
                showToast('加载帖子失败', 'error');
            }
        }

        /**
         * 保存帖子
         */
        async function savePost() {
            const id = document.getElementById('postId').value;
            const title = document.getElementById('postTitle').value.trim();
            const category = document.getElementById('postCategory').value;
            const content = document.getElementById('postContent').value.trim();

            if (!title || !content) {
                showToast('请填写标题和内容', 'warning');
                return;
            }

            try {
                const postData = {
                    title,
                    category,
                    content,
                    image: uploadedImageBlob,
                    timestamp: Date.now()
                };

                if (id) {
                    // 更新现有帖子
                    const existingPost = await dbGet('posts', parseInt(id));
                    Object.assign(existingPost, postData);
                    await dbPut('posts', existingPost);
                    showToast('帖子更新成功', 'success');
                } else {
                    // 创建新帖子
                    await dbPut('posts', postData);
                    showToast('帖子创建成功', 'success');
                }

                await loadPosts();
                closeEditor();
            } catch (error) {
                console.error('保存帖子失败:', error);
                showToast('保存帖子失败', 'error');
            }
        }

        /**
         * 删除帖子
         * @param {number} id - 帖子ID
         */
        async function deletePost(id) {
            if (!confirm('确定要删除这个帖子吗？')) {
                return;
            }

            try {
                await dbDelete('posts', id);
                showToast('帖子删除成功', 'success');
                await loadPosts();
            } catch (error) {
                console.error('删除帖子失败:', error);
                showToast('删除帖子失败', 'error');
            }
        }

        /**
         * 查看帖子详情
         * @param {number} id - 帖子ID
         */
        async function viewPost(id) {
            try {
                const post = await dbGet('posts', id);
                const imageUrl = post.image ? URL.createObjectURL(post.image) : '';
                const date = new Date(post.timestamp).toLocaleString('zh-CN');

                // 创建详情模态框
                const modal = document.createElement('div');
                modal.className = 'modal active';
                modal.innerHTML = `
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2 class="modal-title">${post.title}</h2>
                            <button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="post-header">
                                <span class="post-category">${post.category}</span>
                                <span class="post-date">${date}</span>
                            </div>
                            ${imageUrl ? `<img src="${imageUrl}" class="post-image" alt="帖子图片">` : ''}
                            <div class="post-content" style="-webkit-line-clamp: unset;">${post.content}</div>
                        </div>
                    </div>
                `;

                document.body.appendChild(modal);
            } catch (error) {
                console.error('加载帖子详情失败:', error);
                showToast('加载帖子详情失败', 'error');
            }

        /**
         * 关闭编辑器
         */
        function closeEditor() {
            document.getElementById('editorModal').classList.remove('active');
        }

        // ==================== 图片处理 ====================
        /**
         * 处理图片上传
         * @param {Event} event - 文件选择事件
         */
        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                // 压缩图片
                const compressedBlob = await compressImage(file, {
                    maxWidthOrHeight: 1920,
                    maxSizeMB: 1
                });

                uploadedImageBlob = compressedBlob;

                // 显示预览
                const imagePreview = document.getElementById('imagePreview');
                imagePreview.src = URL.createObjectURL(compressedBlob);
                imagePreview.classList.remove('hidden');

                showToast('图片上传成功', 'success');
            } catch (error) {
                console.error('图片处理失败:', error);
                showToast('图片处理失败', 'error');
            }
        }

        /**
         * 压缩图片
         * @param {File} file - 原始图片文件
         * @param {Object} options - 压缩选项
         * @returns {Promise<Blob>} 压缩后的图片Blob
         */
        function compressImage(file, options = {}) {
            return new Promise((resolve, reject) => {
                const { maxWidthOrHeight = 1920, maxSizeMB = 1 } = options;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        // 创建Canvas进行压缩
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        // 计算缩放比例
                        if (width > maxWidthOrHeight || height > maxWidthOrHeight) {
                            const ratio = Math.min(maxWidthOrHeight / width, maxWidthOrHeight / height);
                            width *= ratio;
                            height *= ratio;
                        }

                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // 转换为Blob
                        canvas.toBlob(
                            (blob) => {
                                if (blob) {
                                    resolve(blob);
                                } else {
                                    reject(new Error('图片压缩失败'));
                                }
                            },
                            'image/jpeg',
                            0.9
                        );
                    };
                    img.onerror = () => reject(new Error('图片加载失败'));
                    img.src = event.target.result;
                };
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsDataURL(file);
            });
        }

        // ==================== 存储管理 ====================
        /**
         * 更新存储空间信息
         */
        async function updateStorageInfo() {
            try {
                // 获取存储空间信息
                if (navigator.storage && navigator.storage.estimate) {
                    const estimate = await navigator.storage.estimate();
                    const usageMB = (estimate.usage / 1024 / 1024).toFixed(2);
                    const quotaMB = (estimate.quota / 1024 / 1024).toFixed(2);
                    const percentage = ((estimate.usage / estimate.quota) * 100).toFixed(1);

                    document.getElementById('storageText').textContent = `${usageMB} MB / ${quotaMB} MB (${percentage}%)`;
                    document.getElementById('storageProgressBar').style.width = `${percentage}%`;
                }

                // 更新统计信息
                const posts = await dbGetAll('posts');
                document.getElementById('postCount').textContent = posts.length;
                document.getElementById('imageCount').textContent = posts.filter(p => p.image).length;
            } catch (error) {
                console.error('更新存储信息失败:', error);
            }
        }

        /**
         * 清除缓存
         */
        async function clearCache() {
            if (!confirm('确定要清除缓存吗？这将删除所有帖子数据！')) {
                return;
            }

            try {
                // 清除IndexedDB数据
                const posts = await dbGetAll('posts');
                for (const post of posts) {
                    await dbDelete('posts', post.id);
                }

                // 清除localStorage
                localStorage.clear();

                // 清除应用缓存
                if (window.caches) {
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                }

                showToast('缓存清理成功', 'success');
                await loadPosts();
                await updateStorageInfo();
            } catch (error) {
                console.error('清除缓存失败:', error);
                showToast('清除缓存失败', 'error');
            }
        }

        // ==================== 数据导入导出 ====================
        /**
         * 导出数据为JSON
         */
        async function exportData() {
            try {
                const posts = await dbGetAll('posts');
                const categories = await loadCategories();

                const data = {
                    version: '1.0',
                    exportDate: new Date().toISOString(),
                    posts: posts.map(post => ({
                        ...post,
                        image: post.image ? post.image : null // 保留Blob引用
                    })),
                    categories
                };

                // 将Blob转换为Base64字符串
                const exportData = {
                    ...data,
                    posts: await Promise.all(data.posts.map(async post => {
                        if (post.image) {
                            const base64 = await blobToBase64(post.image);
                            return { ...post, image: base64 };
                        }
                        return post;
                    }))
                };

                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `forum_backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);

                showToast('数据导出成功', 'success');
            } catch (error) {
                console.error('导出数据失败:', error);
                showToast('导出数据失败', 'error');
            }
        }

        /**
         * 导入JSON数据
         */
        function importData() {
            document.getElementById('importInput').click();
        }

        /**
         * 处理导入文件
         * @param {Event} event - 文件选择事件
         */
        async function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const data = JSON.parse(e.target.result);

                        if (!data.posts || !data.categories) {
                            throw new Error('无效的数据格式');
                        }

                        // 导入分类
                        for (const category of data.categories) {
                            await dbPut('categories', category);
                        }

                        // 导入帖子
                        for (const post of data.posts) {
                            // 将Base64转回Blob
                            if (post.image) {
                                post.image = base64ToBlob(post.image);
                            }
                            await dbPut('posts', post);
                        }

                        showToast('数据导入成功', 'success');
                        await loadCategories();
                        await loadPosts();
                        await updateStorageInfo();
                    } catch (error) {
                        console.error('解析数据失败:', error);
                        showToast('解析数据失败', 'error');
                    }
                };
                reader.readAsText(file);
            } catch (error) {
                console.error('导入数据失败:', error);
                showToast('导入数据失败', 'error');
            }

            // 清空文件输入，允许重复导入同一文件
            event.target.value = '';
        }

        /**
         * 将Blob转换为Base64字符串
         * @param {Blob} blob - Blob对象
         * @returns {Promise<string>} Base64字符串
         */
        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        /**
         * 将Base64字符串转换为Blob
         * @param {string} base64 - Base64字符串
         * @returns {Blob} Blob对象
         */
        function base64ToBlob(base64) {
            const arr = base64.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while (n--) {
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new Blob([u8arr], { type: mime });
        }

        // ==================== PWA功能 ====================
        /**
         * 请求持久化存储
         */
        async function requestPersistentStorage() {
            try {
                if (navigator.storage && navigator.storage.persist) {
                    const granted = await navigator.storage.persist();
                    if (granted) {
                        showToast('持久化存储已启用', 'success');
                    } else {
                        showToast('持久化存储启用失败，请检查浏览器设置', 'warning');
                    }
                } else {
                    showToast('您的浏览器不支持持久化存储', 'warning');
                }
            } catch (error) {
                console.error('请求持久化存储失败:', error);
                showToast('请求持久化存储失败', 'error');
            }
        }

        /**
         * 处理安装提示
         */
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'inline-flex';
        });

        /**
         * 安装应用
         */
        async function installApp() {
            if (!deferredPrompt) {
                showToast('应用已在运行或无法安装', 'warning');
                return;
            }

            try {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                
                if (outcome === 'accepted') {
                    showToast('应用安装成功', 'success');
                }
                
                deferredPrompt = null;
            } catch (error) {
                console.error('安装应用失败:', error);
                showToast('安装应用失败', 'error');
            }
        }

        // ==================== 设置页面 ====================
        /**
         * 显示设置模态框
         */
        async function showSettings() {
            await renderSettingsCategories();
            document.getElementById('settingsModal').classList.add('active');
        }

        /**
         * 关闭设置模态框
         */
        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        // ==================== UI工具 ====================
        /**
         * 显示提示消息
         * @param {string} message - 消息内容
         * @param {string} type - 消息类型 ('success', 'error', 'warning')
         */
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');

            // 设置图标
            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️'
            };
            icon.textContent = icons[type] || '';

            // 设置消息
            msg.textContent = message;

            // 设置样式类
            toast.className = 'toast';
            toast.classList.add(type);

            // 显示提示
            setTimeout(() => toast.classList.add('show'), 10);

            // 自动隐藏
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ==================== 初始化 ====================
        /**
         * 应用初始化
         */
        async function init() {
            try {
                // 初始化数据库
                await initDB();
                
                // 加载数据
                await loadCategories();
                await loadPosts();
                
                console.log('✅ 应用初始化成功');
            } catch (error) {
                console.error('❌ 应用初始化失败:', error);
                showToast('应用初始化失败', 'error');
            }
        }

        // 页面加载完成后初始化应用
        document.addEventListener('DOMContentLoaded', init);

        // 点击模态框外部关闭模态框
        window.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
            }
        });

        // 键盘事件处理
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal.active').forEach(modal => {
                    modal.classList.remove('active');
                });
            }
        });
    </script>
