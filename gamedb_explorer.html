<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <title>GameDB 遊戲查詢</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f5f5;
    }
    .game-card img {
      object-fit: cover;
      height: 220px;
    }
    .game-card {
      cursor: pointer;
      transition: transform .1s ease, box-shadow .1s ease;
    }
    .game-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 0.5rem 1rem rgba(0,0,0,.15);
    }
    .badge-pill {
      border-radius: 999px;
    }
    .scroll-x {
      overflow-x: auto;
      white-space: nowrap;
    }
    .scroll-x > * {
      display: inline-block;
      margin-right: .25rem;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">GameDB 查詢</a>
    <span class="navbar-text small text-muted">
      資料來源：LizardByte/GameDB（IGDB 靜態 JSON API）
    </span>
  </div>
</nav>

<div class="container mb-4">
  <!-- 搜尋列 -->
  <div class="row mb-3">
    <div class="col-12 col-lg-8 mx-auto">
      <div class="input-group">
        <input id="searchInput" type="text" class="form-control" placeholder="輸入遊戲名稱關鍵字，例如：Age of Empires">
        <button id="searchBtn" class="btn btn-primary">搜尋</button>
      </div>
      <div class="d-flex justify-content-between mt-1">
        <small class="text-muted">
          依 GameDB buckets 規則搜尋，點擊卡片可展開詳細資料。
        </small>
        <small id="stats" class="text-muted"></small>
      </div>
    </div>
  </div>

  <!-- 結果列表 -->
  <div id="results" class="row g-3">
    <!-- 動態插入 -->
  </div>
</div>

<!-- 詳細內容 Modal -->
<div class="modal fade" id="gameModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 id="gameModalLabel" class="modal-title">遊戲詳細資料</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="關閉"></button>
      </div>
      <div class="modal-body">
        <div id="gameDetailBody">
          <!-- 動態填入 -->
        </div>
      </div>
      <div class="modal-footer">
        <small class="text-muted me-auto">
          Images © IGDB / respective owners. Data via LizardByte GameDB.
        </small>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const BASE_URL = 'https://app.lizardbyte.dev/GameDB';

const cacheBuckets = new Map();    // bucketName -> { id: { name } }
const cacheGames   = new Map();    // id -> game detail json
let statsData = null;

async function loadStats() {
  try {
    const res = await fetch(\`\${BASE_URL}/stats.json\`);
    if (!res.ok) return;
    statsData = await res.json();
    const el = document.getElementById('stats');
    if (statsData && statsData.games) {
      el.textContent = \`共 \${statsData.games.toLocaleString()} 款遊戲\`;
    }
  } catch (e) {
    console.warn('stats load failed', e);
  }
}

// 根據名稱算 bucket 名（依官方說明）[web:54]
function getBucketFromName(name) {
  if (!name) return '@';
  const trimmed = name.trim();
  if (!trimmed) return '@';
  const alnum = trimmed.toLowerCase().replace(/[^a-z0-9]/g, ' ');
  const chars = alnum.trim().split('');
  if (!chars.length) return '@';
  const first = chars[0];
  const secondOriginal = trimmed.length > 1 ? trimmed[1].toLowerCase() : '';
  if (secondOriginal && /[a-z0-9]/.test(secondOriginal)) {
    return (first + secondOriginal);
  }
  return first;
}

// 讀 bucket 檔
async function loadBucket(bucket) {
  if (cacheBuckets.has(bucket)) return cacheBuckets.get(bucket);
  const url = \`\${BASE_URL}/buckets/\${encodeURIComponent(bucket)}.json\`;
  const res = await fetch(url);
  if (!res.ok) {
    cacheBuckets.set(bucket, {});
    return {};
  }
  const data = await res.json();
  cacheBuckets.set(bucket, data);
  return data;
}

// 搜尋：依關鍵字算可能 bucket，再從 bucket 內 filter
async function searchGames(keyword) {
  keyword = keyword.trim();
  if (!keyword) return [];
  const kwLower = keyword.toLowerCase();

  // 直接從所有已載入 bucket 搜尋 + 目標 bucket
  const targetBucket = getBucketFromName(keyword);
  const bucketsToCheck = new Set([targetBucket]);

  const results = [];

  // 先載入 target bucket
  const bucketData = await loadBucket(targetBucket);
  for (const [id, obj] of Object.entries(bucketData)) {
    if (obj.name && obj.name.toLowerCase().includes(kwLower)) {
      results.push({ id, name: obj.name });
    }
  }

  // 若結果太少，可以補查現有 cache 中其他 bucket
  if (results.length < 5) {
    for (const [bName, bData] of cacheBuckets.entries()) {
      if (bName === targetBucket) continue;
      for (const [id, obj] of Object.entries(bData)) {
        if (obj.name && obj.name.toLowerCase().includes(kwLower)) {
          if (!results.find(r => r.id === id)) {
            results.push({ id, name: obj.name });
          }
        }
      }
      if (results.length >= 50) break;
    }
  }

  return results.slice(0, 50);
}

// 讀 game 詳細 JSON
async function loadGameDetail(id) {
  if (cacheGames.has(id)) return cacheGames.get(id);
  const res = await fetch(\`\${BASE_URL}/games/\${id}.json\`);
  if (!res.ok) throw new Error('game not found');
  const data = await res.json();
  cacheGames.set(id, data);
  return data;
}

// 由 IGDB style url 組成完整圖片 URL
function buildImageUrl(obj, size) {
  if (!obj || !obj.url) return null;
  let url = obj.url;
  if (url.startsWith('//')) url = 'https:' + url;
  if (size) {
    url = url.replace(/t_[^/]+/, size);
  }
  return url;
}

// 平台名稱：GameDB 的 platforms/<id>.json 也有 name，但這裡先簡化：只列 ID
function formatPlatforms(platforms) {
  if (!Array.isArray(platforms) || !platforms.length) return '未知平台';
  return platforms.join(', ');
}

function formatArrayNames(arr) {
  if (!Array.isArray(arr) || !arr.length) return '無';
  return arr.map(a => a.name).join('、');
}

function formatAgeRatings(ratings) {
  if (!Array.isArray(ratings) || !ratings.length) return '無';
  return ratings.map(r => \`\${r.organization?.name || ''} \${r.rating_category?.rating || ''}\`).join('；');
}

function formatReleaseDates(dates) {
  if (!Array.isArray(dates) || !dates.length) return '無';
  return dates.map(d => {
    const year = d.y || '';
    const region = d.release_region?.region || '';
    const plat = d.platform || '';
    return \`\${year}（平台ID \${plat}，\${region}）\`;
  }).join('；');
}

function formatCompanies(companies) {
  if (!Array.isArray(companies) || !companies.length) return '無';
  return companies.map(c => {
    const role = c.developer ? '開發' : '參與';
    return \`\${c.company?.name || ''}（\${role}）\`;
  }).join('；');
}

// 渲染結果卡片
function renderResults(list) {
  const container = document.getElementById('results');
  container.innerHTML = '';
  if (!list.length) {
    container.innerHTML = '<p class="text-center text-muted">沒有找到相符的遊戲。</p>';
    return;
  }
  list.forEach(item => {
    const col = document.createElement('div');
    col.className = 'col-12 col-sm-6 col-md-4 col-lg-3';

    col.innerHTML = \`
      <div class="card game-card h-100" data-id="\${item.id}">
        <div class="bg-secondary d-flex align-items-center justify-content-center text-white" style="height:220px;">
          <span class="text-center px-2">\${item.name}</span>
        </div>
        <div class="card-body">
          <h6 class="card-title text-truncate" title="\${item.name}">\${item.name}</h6>
          <p class="card-text mb-1"><small class="text-muted">ID: \${item.id}</small></p>
          <p class="card-text"><small class="text-muted">點擊查看詳細資料</small></p>
        </div>
      </div>\`;

    col.querySelector('.game-card').addEventListener('click', () => {
      openGameDetail(item.id, item.name);
    });

    container.appendChild(col);
  });
}

// 打開詳細 modal
async function openGameDetail(id, fallbackName) {
  const modalEl = document.getElementById('gameModal');
  const titleEl = document.getElementById('gameModalLabel');
  const bodyEl = document.getElementById('gameDetailBody');

  titleEl.textContent = fallbackName || ('遊戲 #' + id);
  bodyEl.innerHTML = '<p class="text-muted">載入中...</p>';

  const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
  modal.show();

  try {
    const game = await loadGameDetail(id);
    titleEl.textContent = game.name || fallbackName || ('遊戲 #' + id);

    const coverUrl = buildImageUrl(game.cover, 't_cover_big');
    const screenshots = Array.isArray(game.screenshots) ? game.screenshots : [];
    const genres = formatArrayNames(game.genres);
    const themes = formatArrayNames(game.themes);
    const modes = formatArrayNames(game.game_modes);
    const perspectives = formatArrayNames(game.player_perspectives);
    const ageRatings = formatAgeRatings(game.age_ratings);
    const companies = formatCompanies(game.involved_companies);
    const releases = formatReleaseDates(game.release_dates);
    const rating = game.rating ? game.rating.toFixed(1) : 'N/A';
    const url = game.url || '';
    const videos = Array.isArray(game.videos) ? game.videos : [];
    const externalGames = Array.isArray(game.external_games) ? game.external_games : [];

    // screenshots carousel
    let screenshotHtml = '';
    if (screenshots.length) {
      const carouselId = 'carousel-' + id;
      const items = screenshots.slice(0, 6).map((s, idx) => {
        const src = buildImageUrl(s, 't_screenshot_big') || buildImageUrl(s);
        if (!src) return '';
        return \`
          <div class="carousel-item \${idx === 0 ? 'active' : ''}">
            <img src="\${src}" class="d-block w-100" alt="Screenshot \${idx+1}">
          </div>\`;
      }).join('');
      screenshotHtml = \`
        <div id="\${carouselId}" class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-inner">
            \${items}
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#\${carouselId}" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">上一張</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#\${carouselId}" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">下一張</span>
          </button>
        </div>\`;
    } else {
      screenshotHtml = '<p class="text-muted mb-0">沒有截圖資料。</p>';
    }

    // videos
    const videosHtml = videos.length
      ? videos.slice(0, 4).map(v => {
          const thumb = v.thumb || (\`https://i.ytimg.com/vi/\${v.video_id}/hqdefault.jpg\`);
          return \`
            <a href="\${v.url}" target="_blank" class="text-decoration-none me-2 mb-2">
              <img src="\${thumb}" alt="\${v.name}" style="height:80px;object-fit:cover;border-radius:4px;">
            </a>\`;
        }).join('')
      : '<span class="text-muted">無影片資料</span>';

    // external games links
    const externalHtml = externalGames.length
      ? externalGames.map(e => \`<a href="\${e.url}" target="_blank" class="badge bg-secondary me-1 mb-1">\${e.external_game_source?.name || ''}</a>\`).join('')
      : '<span class="text-muted">無</span>';

    bodyEl.innerHTML = \`
      <div class="row g-3">
        <div class="col-12 col-md-4">
          <div class="card mb-3">
            \${coverUrl
              ? \`<img src="\${coverUrl}" class="card-img-top" alt="Cover">\`
              : \`<div class="card-img-top bg-secondary d-flex align-items-center justify-content-center text-white" style="height:260px;">無封面圖</div>\`
            }
            <div class="card-body">
              <h5 class="card-title mb-1">\${game.name || ''}</h5>
              <p class="mb-1"><small class="text-muted">ID: \${game.id}</small></p>
              \${url ? \`<a href="\${url}" target="_blank" class="btn btn-sm btn-outline-primary">IGDB 頁面</a>\` : ''}
            </div>
          </div>

          <div class="card">
            <div class="card-header py-2"><strong>基本資料</strong></div>
            <div class="card-body small">
              <p class="mb-1"><strong>評分：</strong>\${rating}</p>
              <p class="mb-1"><strong>平台ID：</strong>\${formatPlatforms(game.platforms)}</p>
              <p class="mb-1"><strong>遊戲模式：</strong>\${modes}</p>
              <p class="mb-1"><strong>視角：</strong>\${perspectives}</p>
              <p class="mb-1"><strong>類型：</strong>\${genres}</p>
              <p class="mb-1"><strong>主題：</strong>\${themes}</p>
              <p class="mb-1"><strong>分級：</strong>\${ageRatings}</p>
              <p class="mb-1"><strong>公司：</strong>\${companies}</p>
              <p class="mb-1"><strong>發售：</strong>\${releases}</p>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-8">
          <div class="card mb-3">
            <div class="card-header py-2"><strong>簡介</strong></div>
            <div class="card-body">
              <p>\${game.summary || '<span class="text-muted">無摘要</span>'}</p>
              \${game.storyline
                ? '<hr><h6>故事背景</h6><p>' + game.storyline + '</p>'
                : ''
              }
            </div>
          </div>

          <div class="card mb-3">
            <div class="card-header py-2 d-flex justify-content-between align-items-center">
              <strong>截圖</strong>
            </div>
            <div class="card-body">
              \${screenshotHtml}
            </div>
          </div>

          <div class="card mb-3">
            <div class="card-header py-2"><strong>影片</strong></div>
            <div class="card-body">
              <div class="scroll-x">
                \${videosHtml}
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header py-2"><strong>外部連結</strong></div>
            <div class="card-body">
              \${externalHtml}
            </div>
          </div>
        </div>
      </div>\`;
  } catch (e) {
    console.error(e);
    bodyEl.innerHTML = '<p class="text-danger">載入遊戲詳細資料失敗。</p>';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadStats();

  const input = document.getElementById('searchInput');
  const btn = document.getElementById('searchBtn');

  async function doSearch() {
    const kw = input.value;
    if (!kw.trim()) return;
    const results = await searchGames(kw);
    renderResults(results);
  }

  btn.addEventListener('click', doSearch);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
});
</script>
</body>
</html>
